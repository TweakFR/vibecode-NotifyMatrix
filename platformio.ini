; NotifyMatrix — PlatformIO
; Phase 1 : Adafruit Matrix Portal S3 + 2x HUB75 chaines (driver dans src/hub75_matrixportal.cpp).
;
; Autre MCU : dupliquer [env:...], changer board / build_flags (BOARD_*), et une implémentation
; équivalente de Hub75MatrixPortal (ou autre backend) derrière la même interface.

[platformio]
default_envs = matrixportal_s3

[env]
framework = arduino
monitor_speed = 115200
extra_scripts = pre:scripts/gen_secrets_header.py
build_flags =
    -std=gnu++17
    -Wall
    -I include

[env:matrixportal_s3]
platform = espressif32@6.12.0
board = adafruit_matrixportal_esp32s3
; Upload rapide (pas d’erase-all complet). Pour un flash « usine » après essais ratés,
; décommenter : extra_scripts = post:scripts/full_flash_upload.py
; ESP32-S3 USB Serial/JTAG : évite BrokenPipeError sur ioctl(DTR/RTS).
; Upload ROM : maintenir BOOT, appuyer sur RESET, relâcher BOOT
; (pas le double-clic Reset → mode UF2 / disque USB, souvent sans ttyACM0 — cf. README).
board_upload.use_1200bps_touch = false
board_upload.wait_for_upload_port = false
board_upload.before_reset = no_reset
board_upload.after_reset = hard_reset
upload_flags =
    --connect-attempts=10
; Si le moniteur affiche "waiting for download" : mode ROM bootloader — appuyer sur
; Reset (sans BOOT). Voir README section dédiée.
monitor_rts = 0
monitor_dtr = 0
upload_port = /dev/ttyACM0
lib_deps =
    mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display @ ^3.0.15
    ; Requis par la lib HUB75 (#include "Adafruit_GFX.h"), pas optionnel à la compilation.
    adafruit/Adafruit GFX Library
    knolleary/PubSubClient
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    ${env.build_flags}
    -D BOARD_MATRIXPORTAL_S3=1
    ; Pas de SPIRAM_DMA_BUFFER : ProtoTracer fonctionne sans cette option.
    ; Montage courant : deux panneaux HUB75 64x32 chaines horizontalement.
    -D PANEL_CHAIN_LENGTH=2
    ; Serial sur USB CDC (même /dev/ttyACM que le moniteur). ProtoTracer active les mêmes.
    ; Sans cela : LED qui clignote (sketch OK) mais terminal figé sur d’anciennes lignes ROM.
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; Driver HUB75 : laisser SHIFTREG par défaut, comme ProtoTracer MatrixPortalS3Controller.
    ; Si un autre panneau reste noir, tester explicitement :
    ; -D PANEL_HUB75_DRIVER_FM6126A=1
    ; -D PANEL_HUB75_DRIVER_ICN2038S=1
    ; -D PANEL_HUB75_LAT_BLANKING=2
    ; Panneaux 64×32 sans broche E : -DPANEL_HUB75_DISABLE_ROW_E=1
    ; -D PIXEL_COLOR_DEPTH_BITS=6

; Exemple futur (non utilisé) :
; [env:esp32dev_stub]
; platform = espressif32
; board = esp32dev
; build_flags = ${env.build_flags} -D BOARD_ESP32_DEV=1
