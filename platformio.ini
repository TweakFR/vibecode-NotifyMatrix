; NotifyMatrix - PlatformIO
; Adafruit Matrix Portal S3 + horizontally chained HUB75 panels.
;
; For another MCU, duplicate [env:...], change board/build_flags, and add a matching display backend.

[platformio]
default_envs = matrixportal_s3

[env]
framework = arduino
monitor_speed = 115200
extra_scripts = pre:scripts/load_env_config.py
build_flags =
    -std=gnu++17
    -Wall
    -I include

[env:matrixportal_s3]
platform = espressif32@6.12.0
board = adafruit_matrixportal_esp32s3
; Fast upload by default. For a full flash erase, temporarily enable:
; extra_scripts = post:scripts/full_flash_upload.py
; ESP32-S3 USB Serial/JTAG: avoid BrokenPipeError on DTR/RTS ioctl.
; ROM upload: hold BOOT, press and release RESET, then release BOOT.
; Do not double-click Reset; that enters UF2 storage mode instead of the serial bootloader.
board_upload.use_1200bps_touch = false
board_upload.wait_for_upload_port = false
board_upload.before_reset = no_reset
board_upload.after_reset = hard_reset
upload_flags =
    --connect-attempts=10
; If the monitor shows "waiting for download", press Reset without BOOT to boot the sketch.
monitor_rts = 0
monitor_dtr = 0
upload_port = COM3

lib_deps =
    mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display @ ^3.0.15
    ; Required by the HUB75 library (#include "Adafruit_GFX.h").
    adafruit/Adafruit GFX Library
    knolleary/PubSubClient
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    ${env.build_flags}
    -D BOARD_MATRIXPORTAL_S3=1
    ; Current layout: two 64x32 HUB75 panels chained horizontally.
    -D PANEL_CHAIN_LENGTH=2
    ; Serial over USB CDC on the same /dev/ttyACM port used by the monitor.
    ; Without this, the sketch can run while the terminal still shows stale ROM lines.
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; HUB75 driver: keep SHIFTREG by default. If a panel stays black, try:
    ; -D PANEL_HUB75_DRIVER_FM6126A=1
    ; -D PANEL_HUB75_DRIVER_ICN2038S=1
    ; -D PANEL_HUB75_LAT_BLANKING=2
    ; 64x32 panels without E address line: -DPANEL_HUB75_DISABLE_ROW_E=1
    ; -D PIXEL_COLOR_DEPTH_BITS=6

; Future example (unused):
; [env:esp32dev_stub]
; platform = espressif32
; board = esp32dev
; build_flags = ${env.build_flags} -D BOARD_ESP32_DEV=1
